name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Nexus test dependency
        run: python -m pip install PyYAML

      - name: Test structural validator
        run: npm test

      - name: Validate skill structure
        run: npm run validate

      - name: Test simplify reference helper
        run: python skills/simplify/references/test_extract_builtin_prompt.py

      - name: Compare skills CLI discovery with direct children
        shell: bash
        run: |
          set -euo pipefail
          expected="$({
            for directory in skills/*/; do
              test -f "${directory}SKILL.md"
              basename "$directory"
            done
          } | sort)"
          output="$(npx --yes skills@latest add . --list)"
          clean_output="$(printf '%s\n' "$output" | sed -E $'s/\\x1B\\[[0-9;?]*[ -\\/]*[@-~]//g')"
          actual="$(printf '%s\n' "$clean_output" |
            sed -n 's/^│    \([a-z0-9][a-z0-9-]*\)$/\1/p' |
            sort)"
          diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")

      - name: Run Nexus behavioral tests
        shell: bash
        run: |
          set -euo pipefail
          for test_file in skills/nexus/tests/test-*.sh; do
            bash "$test_file"
          done
